services:
  postgres:
    image: postgres:15 
    container_name: taskflow-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres  
      POSTGRES_PASSWORD: taskflow2026
      POSTGRES_DB: taskflow  
    ports:
      - "5432:5432"  
    volumes:
      - postgres-data:/var/lib/postgresql/data  

  pgadmin:  
    image: dpage/pgadmin4:latest
    container_name: taskflow-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: nourhasni@taskflow.com  
      PGADMIN_DEFAULT_PASSWORD: nourhasni2002  
    ports:
      - "5050:80"  
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres  

volumes:
  postgres-data:  
  pgadmin-data:   